# DevLens artifact versions. Mutated ONLY by scripts/release-plan --apply.
# Verified by scripts/release-plan --verify in CI.
#
# Schema:
#   [bom] version        — BOM + CLI version. CLI tracks the BOM (cli/Cargo.toml
#                          version is stamped from this value at release time).
#   [modules] <name>     — per-module version. Modules version INDEPENDENTLY and
#                          may diverge. publishable: core + plugin-*.
#
# Baseline 0.2.0 reflects the last legacy release already on Maven Central
# (confirmed: tech.devlens:core:0.2.0 is the latest published coordinate).
#
# Change detection baseline = per-module tags of the form <module>-v<version>.
# Bootstrap those tags on the migration commit (see migration notes) so the
# first new-system release detects changes from that point. Until the bootstrap
# tags exist, scripts/release-plan --plan is a safe no-op for every module.

[bom]
version = "0.2.0"

[modules]
core = "0.2.0"
plugin-network = "0.2.0"
plugin-db = "0.2.0"
plugin-prefs = "0.2.0"
plugin-layout = "0.2.0"
