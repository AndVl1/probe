name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      android: ${{ steps.filter.outputs.android }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'cli/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            android:
              - 'sdk/android/**'
            ci:
              - '.github/workflows/**'

  rust:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.rust == 'true' ||
      needs.detect-changes.outputs.ci == 'true' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "cli -> cli/target"

      - name: Run tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build release
        run: cargo build --release --workspace

  android:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.android == 'true' ||
      needs.detect-changes.outputs.ci == 'true' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        working-directory: sdk/android
        run: ./gradlew build

      - name: Detect API changes
        id: api_check
        working-directory: sdk/android
        continue-on-error: true
        run: |
          MARKER="<!-- devlens-api-check -->"
          if ! ./gradlew apiCheck 2>/dev/null; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            ./gradlew apiDump 2>/dev/null || true
            {
              echo "$MARKER"
              echo "### ⚠️ API Changes Detected"
              echo ""
              echo "This PR modifies the public API surface. After merge, \`.api\` files will be regenerated automatically."
              echo ""
              echo '```diff'
              git diff --no-color -- '*/api/*.api'
              echo '```'
            } > /tmp/api-comment.md
            git checkout -- . 2>/dev/null || true
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            {
              echo "$MARKER"
              echo "### ✅ No public API changes"
            } > /tmp/api-comment.md
          fi

      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          MARKER="<!-- devlens-api-check -->"
          BODY=$(cat /tmp/api-comment.md)

          # Find existing comment by marker
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$BODY"
          else
            gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -f body="$BODY"
          fi

      - name: Run unit tests
        working-directory: sdk/android
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: sdk/android/*/build/reports/tests/
          retention-days: 7

  android-e2e:
    name: Android E2E Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.android == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: cd sdk/android && ./gradlew :plugin-network:connectedDebugAndroidTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-results
          path: sdk/android/plugin-network/build/reports/androidTests/
          retention-days: 7

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "cli -> cli/target"

      - name: Run integration tests
        run: cargo test --workspace --test '*' -- --nocapture

  ci-status:
    if: always()
    needs: [detect-changes, rust, android, android-e2e, integration]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          results=(
            "${{ needs.rust.result }}"
            "${{ needs.android.result }}"
            "${{ needs.android-e2e.result }}"
            "${{ needs.integration.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "Job failed with result: $result"
              exit 1
            fi
          done
          echo "All required jobs passed."
