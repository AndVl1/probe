name: Prepare Release

# Thin caller of scripts/release-plan. The script owns all version/bump/cascade/
# report logic; this workflow just runs `--apply`, commits the result, and opens
# a PR. If the plan is a no-op (no module changed since its last per-module tag),
# the workflow posts a notice and exits without opening a PR.

on:
  workflow_dispatch:
    inputs:
      bump_override:
        description: 'Force bump type for changed modules (auto = per-module BCV .api classification)'
        required: false
        type: choice
        default: auto
        options:
          - auto
          - patch
          - minor
          - major
      allow_1_0:
        description: 'Allow 1.0 graduation (only relevant with bump=major while major==0)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

# H2: serialize prepare runs so two release-prepare invocations can't race the
# same release branch / Maven Central redeploy. cancel-in-progress MUST be false.
concurrency:
  group: release-prepare
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Set up Rust (for Cargo.lock refresh during --apply)
        uses: dtolnay/rust-toolchain@stable

      - name: Compute release plan (read-only)
        id: plan
        run: |
          BUMP="${{ inputs.bump_override }}"
          BUMP_ARG=()
          [[ -n "$BUMP" && "$BUMP" != "auto" ]] && BUMP_ARG+=(--bump "$BUMP")
          [[ "${{ inputs.allow_1_0 }}" == "true" ]] && BUMP_ARG+=(--allow-1.0)

          PLAN_JSON=$(./scripts/release-plan --plan --format=json "${BUMP_ARG[@]}")
          # M1: jq instead of fragile sed on JSON. jq ships on ubuntu-latest.
          NOOP=$(printf '%s' "$PLAN_JSON" | jq -r '.noop')
          BOM_NEW=$(printf '%s' "$PLAN_JSON" | jq -r '.bom.next')
          echo "noop=$NOOP" >> "$GITHUB_OUTPUT"
          echo "bom_new=$BOM_NEW" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$PLAN_JSON" > /tmp/plan.json
          echo "Plan noop=$NOOP bom_next=$BOM_NEW"

      - name: No-op notice (nothing to release)
        if: steps.plan.outputs.noop == 'true'
        run: |
          echo "::notice::No modules changed since their last per-module tag — nothing to release. No PR created."

      - name: Check release branch does not already exist
        if: steps.plan.outputs.noop != 'true'
        env:
          BOM_NEW: ${{ steps.plan.outputs.bom_new }}
        run: |
          BRANCH="release/v${BOM_NEW}"
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" > /dev/null 2>&1; then
            echo "::error::Branch ${BRANCH} already exists on origin. Delete it or re-run after merging the existing one."
            exit 1
          fi

      - name: Apply plan (mutate versions.toml + cli/Cargo.toml + Cargo.lock)
        if: steps.plan.outputs.noop != 'true'
        run: |
          BUMP="${{ inputs.bump_override }}"
          BUMP_ARG=()
          [[ -n "$BUMP" && "$BUMP" != "auto" ]] && BUMP_ARG+=(--bump "$BUMP")
          [[ "${{ inputs.allow_1_0 }}" == "true" ]] && BUMP_ARG+=(--allow-1.0)
          # --apply writes the PR body (markdown) to stdout.
          ./scripts/release-plan --apply "${BUMP_ARG[@]}" > /tmp/pr-body.md
          echo "--- PR body ---"
          cat /tmp/pr-body.md

      - name: Configure git
        if: steps.plan.outputs.noop != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch and commit version state
        if: steps.plan.outputs.noop != 'true'
        env:
          BOM_NEW: ${{ steps.plan.outputs.bom_new }}
        run: |
          git checkout -b "release/v${BOM_NEW}"
          git add versions.toml cli/Cargo.toml Cargo.lock
          git commit -m "chore(release): bump to v${BOM_NEW} per release-plan"
          git push origin "release/v${BOM_NEW}"

      - name: Create pull request
        if: steps.plan.outputs.noop != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BOM_NEW: ${{ steps.plan.outputs.bom_new }}
        run: |
          {
            echo "## Release v${BOM_NEW}"
            echo ""
            cat /tmp/pr-body.md
            echo ""
            echo "---"
            echo "Merging this PR to \`main\` triggers the **Publish Release** workflow, which publishes only the changed/cascaded modules + BOM and creates per-module tags."
          } > /tmp/pr-final.md

          gh pr create \
            --base main \
            --head "release/v${BOM_NEW}" \
            --title "Release v${BOM_NEW}" \
            --body-file /tmp/pr-final.md
