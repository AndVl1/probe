name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      android: ${{ steps.filter.outputs.android }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'cli/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            android:
              - 'sdk/android/**'
            ci:
              - '.github/workflows/**'

  rust:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.rust == 'true' ||
      needs.detect-changes.outputs.ci == 'true' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "cli -> cli/target"

      - name: Run tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build release
        run: cargo build --release --workspace

  android:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.android == 'true' ||
      needs.detect-changes.outputs.ci == 'true' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # H3: --verify (drift gate) and the release-plan comment below diff
          # against per-module <module>-v* and v* tags. The default shallow +
          # tagless checkout makes both gates silently inert. Full history and
          # tags are required.
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Verify version-state consistency (versions.toml ↔ tags ↔ cli/Cargo.toml)
        run: |
          ./scripts/release-plan --verify

      - name: Build
        working-directory: sdk/android
        run: ./gradlew build -x apiCheck

      - name: Verify BCV .api in sync (hard gate — no generation in PRs)
        # Policy: PRs VERIFY the committed public-API surface (.api must match
        # the code). Generation (apiDump) happens ONLY on develop/main via
        # .github/workflows/api-dump.yml (branch-filtered, never runs on a PR
        # branch). Drift here fails the PR — the author must regenerate locally
        # (`./gradlew apiDump` in sdk/android) and commit the result. CI must
        # never regenerate .api on a branch.
        working-directory: sdk/android
        run: ./gradlew apiCheck

      - name: Rebase onto target branch
        if: github.event_name == 'pull_request'
        id: rebase
        run: |
          git fetch --unshallow 2>/dev/null || true
          git fetch origin "${{ github.event.pull_request.base.ref }}"
          git checkout "${{ github.event.pull_request.head.sha }}"
          git config user.name "ci"
          git config user.email "ci@noreply"
          if ! git rebase "origin/${{ github.event.pull_request.base.ref }}"; then
            git rebase --abort
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            # "Detect API changes" is skipped on conflict, so it never writes
            # /tmp/api-comment.md — produce it here so "Post or update PR comment"
            # does not fail (exit 1) on a benign rebase conflict. The merge itself
            # is unaffected; only the as-rebased API verification is skipped.
            {
              echo "<!-- devlens-api-check -->"
              echo "### ⚠️ API check skipped (rebase conflict)"
              echo ""
              echo "Could not rebase this PR onto \`${{ github.event.pull_request.base.ref }}\` cleanly, so the public-API surface was not verified. Rebase the branch onto \`${{ github.event.pull_request.base.ref }}\` to restore the API check. The merge itself is unaffected."
            } > /tmp/api-comment.md
          fi

      - name: Compute release plan (replaces inline api-change block)
        id: plan
        if: steps.rebase.outputs.conflict != 'true'
        continue-on-error: true
        run: |
          # Same algorithm as release-prepare: per-module bump matrix from BCV
          # .api diffs since the last per-module tag. Posted as the PR comment so
          # reviewers see exactly what a release after this PR would publish.
          MARKER="<!-- devlens-release-plan -->"
          {
            echo "$MARKER"
            echo "### 📦 Release plan (if this PR merges)"
            echo ""
            ./scripts/release-plan --plan --format=markdown
          } > /tmp/release-plan-comment.md

      - name: Post or update PR comment
        if: github.event_name == 'pull_request' && steps.rebase.outputs.conflict != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          MARKER="<!-- devlens-release-plan -->"
          BODY=$(cat /tmp/release-plan-comment.md)

          # Find existing comment by marker
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$BODY"
          else
            gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -f body="$BODY"
          fi

      - name: Run unit tests
        working-directory: sdk/android
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: sdk/android/*/build/reports/tests/
          retention-days: 7

  android-e2e:
    name: Android E2E Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.android == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: cd sdk/android && ./gradlew :plugin-network:connectedDebugAndroidTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-results
          path: sdk/android/plugin-network/build/reports/androidTests/
          retention-days: 7

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "cli -> cli/target"

      - name: Run integration tests
        run: cargo test --workspace --test '*' -- --nocapture

  ci-status:
    if: always()
    needs: [detect-changes, rust, android, android-e2e, integration]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          results=(
            "${{ needs.rust.result }}"
            "${{ needs.android.result }}"
            "${{ needs.android-e2e.result }}"
            "${{ needs.integration.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "Job failed with result: $result"
              exit 1
            fi
          done
          echo "All required jobs passed."
