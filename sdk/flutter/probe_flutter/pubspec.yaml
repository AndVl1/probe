name: probe_flutter
description: Probe plugin for Flutter — inspect network, database, prefs, and layout in real-time.
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.probe.flutter
        pluginClass: ProbeFlutterPlugin
      ios:
        pluginClass: ProbeFlutterPlugin
