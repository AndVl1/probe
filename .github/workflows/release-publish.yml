name: Publish Release

# Thin caller of scripts/release-plan. The script emits a publish-list
# (publish.json) describing what to build/publish/tag and whether each artifact
# is already done (per-module/bom/release tag existence). This workflow:
#   - publishes only PENDING modules + BOM (idempotent: skips done by tag),
#   - runs apiCheck per pending module only (no auto-dump on the release path),
#   - builds CLI binaries + homebrew only if the CLI changed,
#   - creates <module>-v*, bom-v*, and the overall v* tags on success.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# H2: serialize publish runs. cancel-in-progress MUST be false — cancelling
# mid-publish leaves a release suspended on Maven Central (staging repository
# open but not closed) and makes idempotent resume harder, not easier.
concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.list.outputs.should_publish }}
      has_maven: ${{ steps.list.outputs.has_maven }}
      has_cli: ${{ steps.list.outputs.has_cli }}
      bom_version: ${{ steps.list.outputs.bom_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build publish list
        id: list
        run: |
          ./scripts/release-plan --publish-list --format=json > publish.json
          echo "--- publish.json ---"
          cat publish.json

          BOM_VER=$(jq -r '.bom_version' publish.json)
          MAVEN_PENDING=$(jq -r '([.modules[] | select(.status=="pending")] | length > 0) or (.bom.status=="pending")' publish.json)
          HAS_CLI=$(jq -r '.cli.publish_binary' publish.json)

          # should_publish: there is at least one pending artifact (module/bom/release tag).
          ANY_PENDING=$(jq -r '([.modules[] | select(.status=="pending")] | length > 0) or (.bom.status=="pending") or (.release_status=="pending")' publish.json)

          {
            echo "should_publish=$ANY_PENDING"
            echo "has_maven=$MAVEN_PENDING"
            echo "has_cli=$HAS_CLI"
            echo "bom_version=$BOM_VER"
          } >> "$GITHUB_OUTPUT"

          # Persist for downstream jobs via artifact (checkout is fresh per job).
          # Note: the publish list is recomputed in each job from tags, so this
          # artifact is informational; each job re-derives pending set itself.

  test:
    needs: prepare
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "cli -> cli/target"
      - name: Rust tests
        run: cargo test --workspace

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Android build + test
        working-directory: sdk/android
        run: ./gradlew assembleRelease test

  publish-maven:
    needs: [prepare, test]
    if: >-
      needs.prepare.outputs.should_publish == 'true' &&
      needs.prepare.outputs.has_maven == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4

      - name: Publish pending modules + BOM (idempotent per tag + Central HEAD check)
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          ./scripts/release-plan --publish-list --format=json > publish.json

          # ensure_tag <tag>: create (if missing) and push with retry. The tag
          # MUST land for idempotent resume — without it a re-run tries to
          # redeploy an artifact Central has already accepted → hard reject.
          # H5(c).
          ensure_tag() {
            local tag="$1" attempts=0
            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              : # already local
            else
              git tag "$tag"
            fi
            while ! git push origin "$tag"; do
              attempts=$((attempts+1))
              if [[ $attempts -ge 3 ]]; then
                echo "::error::failed to push tag $tag after 3 attempts" >&2
                exit 1
              fi
              echo "tag push retry $attempts for $tag (pulling remote tags)…"
              git fetch --tags origin >/dev/null 2>&1 || true
              # if a parallel push landed it, we are done.
              if git ls-remote --tags origin "refs/tags/${tag}" | grep -q .; then
                break
              fi
              sleep 5
            done
          }

          # on_central <group_or_module> <name> <version> → 0 if the .pom is
          # already published to Maven Central, 1 otherwise. H5(a): partial-
          # failure resume — if Central already has the artifact, skip the
          # deploy and just ensure the tag.
          on_central() {
            local name="$1" ver="$2"
            local url="https://repo1.maven.org/maven2/tech/devlens/${name}/${ver}/${name}-${ver}.pom"
            curl -fsI "$url" >/dev/null 2>&1
          }

          # Per-module: apiCheck (hard gate, BEFORE publish — never publish a
          # module whose committed .api is stale) → publish → tag. No auto-dump
          # on the release path. A single-module apiCheck/publish failure exits
          # the loop (set -e); re-running is idempotent.
          for m in $(jq -r '.modules[] | select(.status=="pending") | .name' publish.json); do
            VER=$(jq -r --arg m "$m" '.modules[] | select(.name==$m) | .version' publish.json)
            echo "::group::Release :$m @ $VER"
            if on_central "$m" "$VER"; then
              echo "::notice::$m $VER already on Maven Central — skipping deploy, ensuring tag."
              ensure_tag "${m}-v${VER}"
              echo "::endgroup::"
              continue
            fi
            ( cd sdk/android && ./gradlew ":$m:apiCheck" )
            ( cd sdk/android && ./gradlew ":$m:publishAllPublicationsToMavenCentral" -Prelease=true )
            ensure_tag "${m}-v${VER}"
            echo "::endgroup::"
          done

          # BOM
          BOM_VER=$(jq -r '.bom_version' publish.json)
          if [[ "$(jq -r '.bom.status' publish.json)" == "pending" ]]; then
            echo "::group::Publish :bom @ $BOM_VER"
            if on_central "devlens-bom" "$BOM_VER"; then
              echo "::notice::devlens-bom $BOM_VER already on Maven Central — skipping deploy, ensuring tag."
            else
              ( cd sdk/android && ./gradlew ":bom:publishAllPublicationsToMavenCentral" -Prelease=true )
            fi
            ensure_tag "bom-v${BOM_VER}"
            echo "::endgroup::"
          fi

  build-binaries:
    needs: [prepare, test]
    if: >-
      needs.prepare.outputs.should_publish == 'true' &&
      needs.prepare.outputs.has_cli == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: devlens-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: devlens-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --manifest-path cli/Cargo.toml --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/devlens ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: [prepare, test, publish-maven, build-binaries]
    if: >-
      always() &&
      needs.prepare.outputs.should_publish == 'true' &&
      needs.test.result == 'success' &&
      (needs.publish-maven.result == 'success' || needs.publish-maven.result == 'skipped') &&
      (needs.build-binaries.result == 'success' || needs.build-binaries.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.bom_version }}
      GH_TOKEN: ${{ github.token }}
      HAS_CLI: ${{ needs.prepare.outputs.has_cli }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create overall release tag v${VERSION}
        run: |
          if git tag -l "v${VERSION}" | grep -q .; then
            echo "Tag v${VERSION} already exists — skipping (idempotent)."
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Download binaries
        if: env.HAS_CLI == 'true'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build release notes
        id: notes
        run: |
          ./scripts/release-plan --publish-list --format=json > publish.json
          BODY="## What's published\n"
          BODY="${BODY}- **Android SDK**: "
          BODY="${BODY}$(jq -r '[.modules[] | select(.status=="done") | \"\\(.name):\\(.version)\"] | join(", ")' publish.json)\n"
          BODY="${BODY}- **BOM**: tech.devlens:devlens-bom:${VERSION}\n"
          if [ "$HAS_CLI" = "true" ]; then
            BODY="${BODY}- **CLI binary** → GitHub Release assets + Homebrew\n"
          fi
          printf '%b\n' "$BODY" > /tmp/release-notes.md

      - name: Create GitHub Release (with binaries)
        if: env.HAS_CLI == 'true'
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            artifacts/devlens-linux-x86_64/devlens-linux-x86_64 \
            artifacts/devlens-macos-aarch64/devlens-macos-aarch64

      - name: Create GitHub Release (no binaries)
        if: env.HAS_CLI != 'true'
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md

  update-homebrew:
    needs: [prepare, release, build-binaries]
    if: >-
      needs.prepare.outputs.should_publish == 'true' &&
      needs.prepare.outputs.has_cli == 'true' &&
      needs.release.result == 'success' &&
      needs.build-binaries.result == 'success'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.bom_version }}
      GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Download binaries for SHA256
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute SHA256 checksums
        id: sha
        run: |
          echo "linux_x86_64=$(sha256sum artifacts/devlens-linux-x86_64/devlens-linux-x86_64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "macos_aarch64=$(sha256sum artifacts/devlens-macos-aarch64/devlens-macos-aarch64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: AndVl1/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          SHA_LINUX_X86_64: ${{ steps.sha.outputs.linux_x86_64 }}
          SHA_MACOS_AARCH64: ${{ steps.sha.outputs.macos_aarch64 }}
        run: |
          cat > homebrew-tap/Formula/devlens.rb << FORMULA
          class Devlens < Formula
            desc "Multi-platform mobile app debugging inspector"
            homepage "https://github.com/AndVl1/probe"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/AndVl1/probe/releases/download/v${VERSION}/devlens-macos-aarch64"
                sha256 "${SHA_MACOS_AARCH64}"
              else
                odie "devlens on macOS requires Apple Silicon (arm64). Intel (x86_64) Macs are no longer supported."
              end
            end

            on_linux do
              url "https://github.com/AndVl1/probe/releases/download/v${VERSION}/devlens-linux-x86_64"
              sha256 "${SHA_LINUX_X86_64}"
            end

            def install
              binary_name = Dir.glob("devlens-*").first || "devlens"
              bin.install binary_name => "devlens"
            end

            test do
              assert_match "devlens", shell_output("#{bin}/devlens --version")
            end
          end
          FORMULA

      - name: Validate formula syntax (ruby -c)
        # C1: catch a malformed formula BEFORE pushing to the tap. A syntax
        # error here breaks `brew install`/`brew upgrade` for every user.
        run: |
          ruby -c homebrew-tap/Formula/devlens.rb

      - name: Push formula update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/devlens.rb
          git commit -m "devlens ${VERSION}"
          git push
